name: Déployer Kult sur GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "kult-app/**"
      - ".github/workflows/deploy-kult.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Publier kult-app sur la branche gh-pages
        run: |
          cd kult-app
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Déploiement Kult (${GITHUB_SHA::7})"
          git push --force "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" gh-pages
